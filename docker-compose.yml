version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: practice_nihongo_db
    environment:
      POSTGRES_DB: practice_nihongo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./practice-nihongo-backend
      dockerfile: Dockerfile
    container_name: practice_nihongo_app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/practice_nihongo_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none
      - SPRING_SQL_INIT_MODE=always
    depends_on:
      - postgres

volumes:
  postgres_data:
