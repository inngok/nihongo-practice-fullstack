version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: practice_nihongo_db
    environment:
      - POSTGRES_DB=practice_nihongo_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345
      - LANG=en_US.utf8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: 
      context: ./practice-nihongo-backend
      dockerfile: Dockerfile
    container_name: practice_nihongo_app
    ports:
      - "80:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/practice_nihongo_db?characterEncoding=UTF-8
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=12345
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none
      - SPRING_SQL_INIT_MODE=always
    depends_on:
      - postgres

volumes:
  postgres_data:
