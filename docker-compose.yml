version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: practice_nihongo_db
    environment:
      - POSTGRES_DB=practice_nihongo_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - LANG=en_US.utf8
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: practice_nihongo_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ./practice-nihongo-backend
      dockerfile: Dockerfile
    container_name: practice_nihongo_app
    ports:
      - "80:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/practice_nihongo_db?characterEncoding=UTF-8
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_SQL_INIT_MODE=never
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
