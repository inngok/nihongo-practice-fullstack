name: Deploy to EC2
on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd practice-nihongo-backend
          mvn clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "practice-nihongo-backend/target/*.jar"
          target: "~/pracice-nihongo/"
          # Removed strip_components to preserve the 'target' directory structure for Dockerfile

      - name: Copy Docker files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,practice-nihongo-backend/Dockerfile"
          target: "~/pracice-nihongo/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/pracice-nihongo
            
            # Stop current services
            sudo docker compose down || true
            
            # Deep clean Docker to free up space and clear corrupted cache
            sudo docker system prune -af || true
            sudo docker builder prune -af || true
            
            # Stop any leftover standalone Java processes from previous manual runs
            sudo pkill -9 java || true
            
            # Start the application and database with a fresh Docker build
            sudo docker compose up -d --build
