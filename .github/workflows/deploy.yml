name: Deploy to EC2
on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd practice-nihongo-backend
          mvn clean package -DskipTests

      - name: Copy JAR to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "practice-nihongo-backend/target/*.jar"
          target: "~/nihongo-practice-fullstack/"

      - name: Copy Docker files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "docker-compose.yml,practice-nihongo-backend/Dockerfile"
          target: "~/nihongo-practice-fullstack/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd ~/nihongo-practice-fullstack
            
            # Stop current services
            docker-compose down || true
            
            # Deep clean Docker to free up space and clear corrupted cache
            docker system prune -af || true
            docker builder prune -af || true
            
            # Start the application and database
            docker-compose up -d --build
