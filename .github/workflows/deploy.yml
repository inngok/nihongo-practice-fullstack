name: Deploy to EC2
on:
  push:
    branches:
      - develop

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: |
          cd practice-nihongo-backend
          mvn clean package -DskipTests

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "practice-nihongo-backend/target/*.jar"
          target: "~/pracice-nihongo/practice-nihongo-backend/"
          strip_components: 2

      - name: Copy Docker files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,practice-nihongo-backend/Dockerfile"
          target: "~/pracice-nihongo/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/pracice-nihongo
            # XÓA SẠCH CONTAINER VÀ VOLUME CŨ (Cực kỳ quan trọng để reset mật khẩu DB)
            sudo docker-compose down -v || true
            sudo docker system prune -af --volumes || true
            
            # KHỞI ĐỘNG LẠI
            sudo docker-compose up -d --build
            
            echo "--- WAITING FOR APP ---"
            sleep 20
            sudo docker-compose logs --tail 50 backend
